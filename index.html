<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ミャルカリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f8ff;
        --surface: #ffffff;
        --surface-soft: #eaf3ff;
        --blue: #8fc5ff;
        --blue-strong: #2f7edb;
        --ink: #1d2733;
        --muted: #667385;
        --line: #d7e6f8;
        --shadow: 0 18px 40px rgba(47, 126, 219, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 0%, rgba(143, 197, 255, 0.3), transparent 34rem),
          linear-gradient(180deg, #fff 0%, var(--bg) 38%, #fff 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 88px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px clamp(16px, 4vw, 40px);
        border-bottom: 1px solid rgba(215, 230, 248, 0.9);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: max-content;
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--blue-strong), var(--blue));
        box-shadow: 0 10px 20px rgba(47, 126, 219, 0.22);
      }

      .search {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-soft);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
      }

      .sell-button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        color: #fff;
        font-weight: 700;
        background: var(--blue-strong);
        box-shadow: 0 12px 24px rgba(47, 126, 219, 0.22);
      }

      .ghost-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 16px;
        color: var(--blue-strong);
        font-weight: 700;
        background: #fff;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px clamp(16px, 4vw, 40px);
      }

      .dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }

      .intro {
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 1.08;
      }

      .intro p,
      .panel p {
        margin: 0;
        color: var(--muted);
      }

      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quick-actions button,
      .category-tabs button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 14px;
        color: var(--ink);
        background: #fff;
      }

      .quick-actions button.active,
      .category-tabs button.active {
        border-color: var(--blue-strong);
        color: #fff;
        background: var(--blue-strong);
      }

      .panel {
        display: grid;
        gap: 16px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .panel h2,
      .section-title h2 {
        margin: 0;
        font-size: 1.15rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .stat {
        padding: 12px;
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .stat strong {
        display: block;
        font-size: 1.35rem;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin: 28px 0 16px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .category-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .item-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 24px rgba(92, 54, 67, 0.08);
      }

      .photo {
        position: relative;
        aspect-ratio: 1 / 1;
        background: var(--surface-soft);
      }

      .photo::before {
        content: "";
        position: absolute;
        inset: 14%;
        border-radius: 12px;
        background: var(--item-bg);
        box-shadow: inset 0 -22px 34px rgba(0, 0, 0, 0.08);
      }

      .photo::after {
        content: "";
        position: absolute;
        right: 16%;
        bottom: 15%;
        width: 28%;
        height: 10%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
      }

      .badge,
      .like {
        position: absolute;
        z-index: 1;
        border: 0;
      }

      .badge {
        left: 10px;
        top: 10px;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--blue-strong);
        font-size: 0.78rem;
        font-weight: 700;
        background: #fff;
      }

      .like {
        right: 10px;
        top: 10px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 999px;
        color: var(--blue-strong);
        background: rgba(255, 255, 255, 0.9);
      }

      .like.active {
        color: #fff;
        background: var(--blue-strong);
      }

      .item-body {
        display: grid;
        gap: 8px;
        padding: 14px;
      }

      .item-name {
        margin: 0;
        font-weight: 700;
      }

      .item-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .price {
        font-size: 1.18rem;
        font-weight: 800;
      }

      .location {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .view {
        display: block;
      }

      .view[hidden] {
        display: none;
      }

      .seller-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
      }

      .seller-header h1 {
        font-size: clamp(1.8rem, 3vw, 3rem);
      }

      .seller-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 24px;
        align-items: start;
      }

      .listing-form,
      .preview-panel {
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .form-field {
        display: grid;
        gap: 7px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .form-field span {
        color: var(--ink);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .form-field input,
      .form-field select,
      .form-field textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        color: var(--ink);
        background: var(--surface-soft);
      }

      .form-field textarea {
        min-height: 128px;
        resize: vertical;
      }

      .upload-box {
        display: grid;
        gap: 10px;
        place-items: center;
        min-height: 180px;
        border: 2px dashed #aacbf0;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        color: var(--muted);
        background: #f7fbff;
      }

      .upload-box strong {
        color: var(--blue-strong);
      }

      .upload-box input {
        max-width: 280px;
      }

      .photo-preview-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .photo-preview {
        position: relative;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .photo-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .empty-preview {
        display: grid;
        min-height: 180px;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: var(--surface-soft);
        text-align: center;
      }

      .summary-card {
        display: grid;
        gap: 12px;
      }

      .summary-photo {
        aspect-ratio: 4 / 3;
        border-radius: 8px;
        background: linear-gradient(135deg, #d7eaff, #ffffff);
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .summary-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .summary-card h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .summary-card p {
        margin: 0;
        color: var(--muted);
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .bottom-nav {
        position: fixed;
        right: 16px;
        bottom: 16px;
        left: 16px;
        z-index: 12;
        display: none;
        grid-template-columns: repeat(4, 1fr);
        max-width: 520px;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .bottom-nav button {
        border: 0;
        padding: 11px 8px;
        color: var(--muted);
        background: transparent;
      }

      .bottom-nav button.active {
        color: var(--blue-strong);
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .topbar {
          grid-template-columns: 1fr auto;
        }

        .search {
          grid-column: 1 / -1;
          order: 3;
        }

        .dashboard {
          grid-template-columns: 1fr;
        }

        .seller-layout {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .sell-button {
          padding: 10px 14px;
        }

        .intro {
          padding: 22px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .seller-header {
          display: grid;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .photo-preview-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid {
          gap: 12px;
        }

        .item-body {
          padding: 12px;
        }

        .bottom-nav {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand" aria-label="ミャルカリ">
          <span class="brand-mark">R</span>
          <span>ミャルカリ</span>
        </div>
        <label class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="なにを探しますか？" autocomplete="off">
        </label>
        <button class="sell-button" type="button" data-open-seller>出品する</button>
      </header>

      <main>
        <section class="view" id="marketView">
          <div class="dashboard" aria-label="マーケット概要">
            <div class="intro">
              <h1>業者用フリマアプリ</h1>
              <p>お気に入りの服、雑貨、ガジェットを気軽に見つけて、すぐに出品できるマーケットです。</p>
              <div class="quick-actions" aria-label="おすすめ条件">
                <button class="active" type="button">おすすめ</button>
                <button type="button">新品に近い</button>
                <button type="button">送料込み</button>
                <button type="button">本日発送</button>
              </div>
            </div>

            <aside class="panel" aria-label="アカウント状況">
              <h2>今日のマーケット</h2>
              <p>出品と購入の状況をすばやく確認できます。</p>
              <div class="stats">
                <div class="stat">
                  <strong>24</strong>
                  <span>新着</span>
                </div>
                <div class="stat">
                  <strong>8</strong>
                  <span>いいね</span>
                </div>
                <div class="stat">
                  <strong>3</strong>
                  <span>取引中</span>
                </div>
              </div>
            </aside>
          </div>

          <div class="section-title">
            <div>
              <h2>見つける</h2>
              <span id="resultCount">8件の商品</span>
            </div>
          </div>

          <nav class="category-tabs" aria-label="カテゴリ">
            <button class="active" type="button" data-category="all">すべて</button>
            <button type="button" data-category="fashion">ファッション</button>
            <button type="button" data-category="goods">雑貨</button>
            <button type="button" data-category="tech">ガジェット</button>
            <button type="button" data-category="books">本</button>
          </nav>

          <section class="grid" id="itemGrid" aria-label="商品一覧"></section>
        </section>

        <section class="view" id="sellerView" hidden>
          <div class="seller-header">
            <div>
              <h1>出品者用画面</h1>
              <p>商品の写真、価格、在庫情報を登録して、業者向けに出品できます。</p>
            </div>
            <button class="ghost-button" type="button" data-open-market>一覧へ戻る</button>
          </div>

          <div class="seller-layout">
            <form class="listing-form" id="listingForm">
              <label class="form-field full">
                <span>商品の写真</span>
                <div class="upload-box">
                  <strong>写真を追加</strong>
                  <small>複数枚選択できます。1枚目がメイン写真になります。</small>
                  <input id="photoInput" type="file" accept="image/*" multiple>
                </div>
              </label>

              <div class="photo-preview-grid" id="photoPreviewGrid">
                <div class="empty-preview">写真を選択すると<br>ここに表示されます</div>
              </div>

              <div class="form-grid">
                <label class="form-field">
                  <span>商品名</span>
                  <input id="listingName" type="text" placeholder="例: 業務用タブレットスタンド" value="業務用タブレットスタンド">
                </label>
                <label class="form-field">
                  <span>販売価格</span>
                  <input id="listingPrice" type="number" min="0" placeholder="5800" value="5800">
                </label>
                <label class="form-field">
                  <span>カテゴリ</span>
                  <select id="listingCategory">
                    <option>ガジェット</option>
                    <option>什器・備品</option>
                    <option>アパレル</option>
                    <option>梱包資材</option>
                    <option>書籍・マニュアル</option>
                  </select>
                </label>
                <label class="form-field">
                  <span>在庫数</span>
                  <input id="listingStock" type="number" min="1" placeholder="12" value="12">
                </label>
                <label class="form-field">
                  <span>発送元</span>
                  <input id="listingArea" type="text" placeholder="東京" value="東京">
                </label>
                <label class="form-field">
                  <span>商品状態</span>
                  <select id="listingCondition">
                    <option>新品・未使用</option>
                    <option>未使用に近い</option>
                    <option>目立った傷や汚れなし</option>
                    <option>業務利用済み</option>
                  </select>
                </label>
                <label class="form-field full">
                  <span>商品説明</span>
                  <textarea id="listingDescription" placeholder="商品の特徴、ロット数、発送条件などを入力">店舗備品としてまとめて仕入れた商品です。複数購入や継続取引にも対応できます。</textarea>
                </label>
              </div>

              <div class="form-actions">
                <button class="ghost-button" type="reset">下書きをリセット</button>
                <button class="sell-button" type="submit">出品内容を保存</button>
              </div>
            </form>

            <aside class="preview-panel" aria-label="出品プレビュー">
              <div class="summary-card">
                <div class="summary-photo" id="summaryPhoto"></div>
                <h2 id="summaryName">業務用タブレットスタンド</h2>
                <p><strong id="summaryPrice">¥5,800</strong> ・ <span id="summaryStock">在庫 12点</span></p>
                <p id="summaryMeta">ガジェット / 東京 / 新品・未使用</p>
                <p id="summaryDescription">店舗備品としてまとめて仕入れた商品です。複数購入や継続取引にも対応できます。</p>
              </div>
            </aside>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="メインナビゲーション">
        <button class="active" type="button">ホーム</button>
        <button type="button">検索</button>
        <button type="button" data-open-seller>出品</button>
        <button type="button">マイページ</button>
      </nav>
    </div>

    <script>
      const items = [
        { name: "サテンリボンブラウス", price: "2,400", category: "fashion", tag: "美品", area: "東京", bg: "linear-gradient(135deg, #d7eaff, #ffffff)" },
        { name: "桜色ミニバッグ", price: "3,200", category: "fashion", tag: "人気", area: "神奈川", bg: "linear-gradient(135deg, #8fc5ff, #eaf3ff)" },
        { name: "ホワイトマグセット", price: "1,500", category: "goods", tag: "送料込", area: "大阪", bg: "linear-gradient(135deg, #ffffff, #cfe4ff)" },
        { name: "ワイヤレスイヤホン", price: "5,800", category: "tech", tag: "即発送", area: "福岡", bg: "linear-gradient(135deg, #ffffff, #bcd8ff)" },
        { name: "淡色ルームライト", price: "2,900", category: "goods", tag: "未使用", area: "京都", bg: "linear-gradient(135deg, #eef6ff, #ffffff)" },
        { name: "料理レシピブック", price: "900", category: "books", tag: "良品", area: "愛知", bg: "linear-gradient(135deg, #dfeeff, #ffffff)" },
        { name: "レザー調カードケース", price: "1,200", category: "fashion", tag: "定番", area: "千葉", bg: "linear-gradient(135deg, #d7eaff, #f3f8ff)" },
        { name: "タブレットスタンド", price: "1,800", category: "tech", tag: "便利", area: "兵庫", bg: "linear-gradient(135deg, #ffffff, #d8edf8)" }
      ];

      const grid = document.querySelector("#itemGrid");
      const resultCount = document.querySelector("#resultCount");
      const searchInput = document.querySelector("#searchInput");
      const categoryButtons = document.querySelectorAll("[data-category]");
      const marketView = document.querySelector("#marketView");
      const sellerView = document.querySelector("#sellerView");
      const photoInput = document.querySelector("#photoInput");
      const photoPreviewGrid = document.querySelector("#photoPreviewGrid");
      const summaryPhoto = document.querySelector("#summaryPhoto");
      const listingForm = document.querySelector("#listingForm");
      const listingFields = {
        name: document.querySelector("#listingName"),
        price: document.querySelector("#listingPrice"),
        category: document.querySelector("#listingCategory"),
        stock: document.querySelector("#listingStock"),
        area: document.querySelector("#listingArea"),
        condition: document.querySelector("#listingCondition"),
        description: document.querySelector("#listingDescription")
      };
      const summaryFields = {
        name: document.querySelector("#summaryName"),
        price: document.querySelector("#summaryPrice"),
        stock: document.querySelector("#summaryStock"),
        meta: document.querySelector("#summaryMeta"),
        description: document.querySelector("#summaryDescription")
      };
      let currentCategory = "all";
      let previewUrls = [];

      function renderItems() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = items.filter((item) => {
          const matchesCategory = currentCategory === "all" || item.category === currentCategory;
          const matchesKeyword = item.name.toLowerCase().includes(keyword) || item.area.toLowerCase().includes(keyword);
          return matchesCategory && matchesKeyword;
        });

        resultCount.textContent = `${filtered.length}件の商品`;
        grid.innerHTML = filtered.map((item) => `
          <article class="item-card">
            <div class="photo" style="--item-bg: ${item.bg}">
              <span class="badge">${item.tag}</span>
              <button class="like" type="button" aria-label="${item.name}をお気に入りに追加">♡</button>
            </div>
            <div class="item-body">
              <p class="item-name">${item.name}</p>
              <div class="item-meta">
                <span class="price">¥${item.price}</span>
                <span class="location">${item.area}</span>
              </div>
            </div>
          </article>
        `).join("");
      }

      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => {
          categoryButtons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          currentCategory = button.dataset.category;
          renderItems();
        });
      });

      searchInput.addEventListener("input", renderItems);

      grid.addEventListener("click", (event) => {
        const button = event.target.closest(".like");
        if (!button) return;
        button.classList.toggle("active");
        button.textContent = button.classList.contains("active") ? "♥" : "♡";
      });

      function openSellerView() {
        marketView.hidden = true;
        sellerView.hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openMarketView() {
        sellerView.hidden = true;
        marketView.hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function formatYen(value) {
        const amount = Number(value || 0);
        return `¥${amount.toLocaleString("ja-JP")}`;
      }

      function updateListingSummary() {
        summaryFields.name.textContent = listingFields.name.value || "商品名未入力";
        summaryFields.price.textContent = formatYen(listingFields.price.value);
        summaryFields.stock.textContent = `在庫 ${listingFields.stock.value || 0}点`;
        summaryFields.meta.textContent = `${listingFields.category.value} / ${listingFields.area.value || "発送元未入力"} / ${listingFields.condition.value}`;
        summaryFields.description.textContent = listingFields.description.value || "商品説明未入力";
      }

      function clearPreviewUrls() {
        previewUrls.forEach((url) => URL.revokeObjectURL(url));
        previewUrls = [];
      }

      function renderPhotoPreviews(files) {
        clearPreviewUrls();
        const selectedFiles = Array.from(files).slice(0, 8);

        if (selectedFiles.length === 0) {
          photoPreviewGrid.innerHTML = '<div class="empty-preview">写真を選択すると<br>ここに表示されます</div>';
          summaryPhoto.innerHTML = "";
          return;
        }

        const previews = selectedFiles.map((file) => {
          const url = URL.createObjectURL(file);
          previewUrls.push(url);
          return { file, url };
        });

        photoPreviewGrid.innerHTML = previews.map((preview, index) => `
          <div class="photo-preview">
            <img src="${preview.url}" alt="追加した商品写真 ${index + 1}">
          </div>
        `).join("");

        summaryPhoto.innerHTML = `<img src="${previews[0].url}" alt="出品商品のメイン写真">`;
      }

      document.querySelectorAll("[data-open-seller]").forEach((button) => {
        button.addEventListener("click", openSellerView);
      });

      document.querySelector("[data-open-market]").addEventListener("click", openMarketView);

      Object.values(listingFields).forEach((field) => {
        field.addEventListener("input", updateListingSummary);
        field.addEventListener("change", updateListingSummary);
      });

      photoInput.addEventListener("change", () => {
        renderPhotoPreviews(photoInput.files);
      });

      listingForm.addEventListener("submit", (event) => {
        event.preventDefault();
        alert("出品内容を保存しました。");
      });

      listingForm.addEventListener("reset", () => {
        setTimeout(() => {
          photoInput.value = "";
          renderPhotoPreviews([]);
          updateListingSummary();
        });
      });

      renderItems();
      updateListingSummary();
    </script>
  </body>
</html>
