<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ミャルカリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7fa;
        --surface: #ffffff;
        --surface-soft: #fff0f5;
        --pink: #f8a8c4;
        --pink-strong: #ec6f9d;
        --ink: #2f2529;
        --muted: #76686e;
        --line: #f2d9e3;
        --shadow: 0 18px 40px rgba(214, 108, 145, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 0%, rgba(248, 168, 196, 0.28), transparent 34rem),
          linear-gradient(180deg, #fff 0%, var(--bg) 38%, #fff 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 88px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px clamp(16px, 4vw, 40px);
        border-bottom: 1px solid rgba(242, 217, 227, 0.86);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: max-content;
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--pink-strong), var(--pink));
        box-shadow: 0 10px 20px rgba(236, 111, 157, 0.25);
      }

      .search {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-soft);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
      }

      .sell-button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        color: #fff;
        font-weight: 700;
        background: var(--pink-strong);
        box-shadow: 0 12px 24px rgba(236, 111, 157, 0.24);
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px clamp(16px, 4vw, 40px);
      }

      .dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }

      .intro {
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 1.08;
      }

      .intro p,
      .panel p {
        margin: 0;
        color: var(--muted);
      }

      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quick-actions button,
      .category-tabs button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 14px;
        color: var(--ink);
        background: #fff;
      }

      .quick-actions button.active,
      .category-tabs button.active {
        border-color: var(--pink-strong);
        color: #fff;
        background: var(--pink-strong);
      }

      .panel {
        display: grid;
        gap: 16px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .panel h2,
      .section-title h2 {
        margin: 0;
        font-size: 1.15rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .stat {
        padding: 12px;
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .stat strong {
        display: block;
        font-size: 1.35rem;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin: 28px 0 16px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .category-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .item-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 24px rgba(92, 54, 67, 0.08);
      }

      .photo {
        position: relative;
        aspect-ratio: 1 / 1;
        background: var(--surface-soft);
      }

      .photo::before {
        content: "";
        position: absolute;
        inset: 14%;
        border-radius: 12px;
        background: var(--item-bg);
        box-shadow: inset 0 -22px 34px rgba(0, 0, 0, 0.08);
      }

      .photo::after {
        content: "";
        position: absolute;
        right: 16%;
        bottom: 15%;
        width: 28%;
        height: 10%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
      }

      .badge,
      .like {
        position: absolute;
        z-index: 1;
        border: 0;
      }

      .badge {
        left: 10px;
        top: 10px;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--pink-strong);
        font-size: 0.78rem;
        font-weight: 700;
        background: #fff;
      }

      .like {
        right: 10px;
        top: 10px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 999px;
        color: var(--pink-strong);
        background: rgba(255, 255, 255, 0.9);
      }

      .like.active {
        color: #fff;
        background: var(--pink-strong);
      }

      .item-body {
        display: grid;
        gap: 8px;
        padding: 14px;
      }

      .item-name {
        margin: 0;
        font-weight: 700;
      }

      .item-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .price {
        font-size: 1.18rem;
        font-weight: 800;
      }

      .location {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .bottom-nav {
        position: fixed;
        right: 16px;
        bottom: 16px;
        left: 16px;
        z-index: 12;
        display: none;
        grid-template-columns: repeat(4, 1fr);
        max-width: 520px;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .bottom-nav button {
        border: 0;
        padding: 11px 8px;
        color: var(--muted);
        background: transparent;
      }

      .bottom-nav button.active {
        color: var(--pink-strong);
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .topbar {
          grid-template-columns: 1fr auto;
        }

        .search {
          grid-column: 1 / -1;
          order: 3;
        }

        .dashboard {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .sell-button {
          padding: 10px 14px;
        }

        .intro {
          padding: 22px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .grid {
          gap: 12px;
        }

        .item-body {
          padding: 12px;
        }

        .bottom-nav {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand" aria-label="ミャルカリ">
          <span class="brand-mark">R</span>
          <span>ミャルカリ</span>
        </div>
        <label class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="なにを探しますか？" autocomplete="off">
        </label>
        <button class="sell-button" type="button">出品する</button>
      </header>

      <main>
        <section class="dashboard" aria-label="マーケット概要">
          <div class="intro">
            <h1>白と淡いピンクで探しやすいフリマアプリ</h1>
            <p>お気に入りの服、雑貨、ガジェットを気軽に見つけて、すぐに出品できるマーケットです。</p>
            <div class="quick-actions" aria-label="おすすめ条件">
              <button class="active" type="button">おすすめ</button>
              <button type="button">新品に近い</button>
              <button type="button">送料込み</button>
              <button type="button">本日発送</button>
            </div>
          </div>

          <aside class="panel" aria-label="アカウント状況">
            <h2>今日のマーケット</h2>
            <p>出品と購入の状況をすばやく確認できます。</p>
            <div class="stats">
              <div class="stat">
                <strong>24</strong>
                <span>新着</span>
              </div>
              <div class="stat">
                <strong>8</strong>
                <span>いいね</span>
              </div>
              <div class="stat">
                <strong>3</strong>
                <span>取引中</span>
              </div>
            </div>
          </aside>
        </section>

        <div class="section-title">
          <div>
            <h2>見つける</h2>
            <span id="resultCount">8件の商品</span>
          </div>
        </div>

        <nav class="category-tabs" aria-label="カテゴリ">
          <button class="active" type="button" data-category="all">すべて</button>
          <button type="button" data-category="fashion">ファッション</button>
          <button type="button" data-category="goods">雑貨</button>
          <button type="button" data-category="tech">ガジェット</button>
          <button type="button" data-category="books">本</button>
        </nav>

        <section class="grid" id="itemGrid" aria-label="商品一覧"></section>
      </main>

      <nav class="bottom-nav" aria-label="メインナビゲーション">
        <button class="active" type="button">ホーム</button>
        <button type="button">検索</button>
        <button type="button">出品</button>
        <button type="button">マイページ</button>
      </nav>
    </div>

    <script>
      const items = [
        { name: "サテンリボンブラウス", price: "2,400", category: "fashion", tag: "美品", area: "東京", bg: "linear-gradient(135deg, #ffd6e6, #fff)" },
        { name: "桜色ミニバッグ", price: "3,200", category: "fashion", tag: "人気", area: "神奈川", bg: "linear-gradient(135deg, #f8a8c4, #fbe7ef)" },
        { name: "ホワイトマグセット", price: "1,500", category: "goods", tag: "送料込", area: "大阪", bg: "linear-gradient(135deg, #ffffff, #ffdce9)" },
        { name: "ワイヤレスイヤホン", price: "5,800", category: "tech", tag: "即発送", area: "福岡", bg: "linear-gradient(135deg, #fff, #dfe8ff)" },
        { name: "淡色ルームライト", price: "2,900", category: "goods", tag: "未使用", area: "京都", bg: "linear-gradient(135deg, #fff4c7, #fff)" },
        { name: "料理レシピブック", price: "900", category: "books", tag: "良品", area: "愛知", bg: "linear-gradient(135deg, #ffe6ef, #ffffff)" },
        { name: "レザー調カードケース", price: "1,200", category: "fashion", tag: "定番", area: "千葉", bg: "linear-gradient(135deg, #ffd6e6, #f3f3f3)" },
        { name: "タブレットスタンド", price: "1,800", category: "tech", tag: "便利", area: "兵庫", bg: "linear-gradient(135deg, #ffffff, #e9f4f0)" }
      ];

      const grid = document.querySelector("#itemGrid");
      const resultCount = document.querySelector("#resultCount");
      const searchInput = document.querySelector("#searchInput");
      const categoryButtons = document.querySelectorAll("[data-category]");
      let currentCategory = "all";

      function renderItems() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = items.filter((item) => {
          const matchesCategory = currentCategory === "all" || item.category === currentCategory;
          const matchesKeyword = item.name.toLowerCase().includes(keyword) || item.area.toLowerCase().includes(keyword);
          return matchesCategory && matchesKeyword;
        });

        resultCount.textContent = `${filtered.length}件の商品`;
        grid.innerHTML = filtered.map((item) => `
          <article class="item-card">
            <div class="photo" style="--item-bg: ${item.bg}">
              <span class="badge">${item.tag}</span>
              <button class="like" type="button" aria-label="${item.name}をお気に入りに追加">♡</button>
            </div>
            <div class="item-body">
              <p class="item-name">${item.name}</p>
              <div class="item-meta">
                <span class="price">¥${item.price}</span>
                <span class="location">${item.area}</span>
              </div>
            </div>
          </article>
        `).join("");
      }

      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => {
          categoryButtons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          currentCategory = button.dataset.category;
          renderItems();
        });
      });

      searchInput.addEventListener("input", renderItems);

      grid.addEventListener("click", (event) => {
        const button = event.target.closest(".like");
        if (!button) return;
        button.classList.toggle("active");
        button.textContent = button.classList.contains("active") ? "♥" : "♡";
      });

      renderItems();
    </script>
  </body>
</html>
