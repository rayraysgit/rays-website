<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ミャルカリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f8ff;
        --surface: #ffffff;
        --surface-soft: #eaf3ff;
        --blue: #8fc5ff;
        --blue-strong: #2f7edb;
        --ink: #1d2733;
        --muted: #667385;
        --line: #d7e6f8;
        --shadow: 0 18px 40px rgba(47, 126, 219, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 0%, rgba(143, 197, 255, 0.3), transparent 34rem),
          linear-gradient(180deg, #fff 0%, var(--bg) 38%, #fff 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 88px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px clamp(16px, 4vw, 40px);
        border-bottom: 1px solid rgba(215, 230, 248, 0.9);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .header-actions {
        display: grid;
        gap: 8px;
        justify-items: end;
      }

      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: max-content;
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--blue-strong), var(--blue));
        box-shadow: 0 10px 20px rgba(47, 126, 219, 0.22);
      }

      .search {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-soft);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
      }

      .sell-button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        color: #fff;
        font-weight: 700;
        background: var(--blue-strong);
        box-shadow: 0 12px 24px rgba(47, 126, 219, 0.22);
      }

      .sell-button:disabled {
        cursor: not-allowed;
        background: #9aa7b7;
        box-shadow: none;
        opacity: 0.68;
      }

      .ghost-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 16px;
        color: var(--blue-strong);
        font-weight: 700;
        background: #fff;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px clamp(16px, 4vw, 40px);
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 1.08;
      }

      .panel p {
        margin: 0;
        color: var(--muted);
      }

      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quick-actions button,
      .category-tabs button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 14px;
        color: var(--ink);
        background: #fff;
      }

      .quick-actions button.active,
      .category-tabs button.active {
        border-color: var(--blue-strong);
        color: #fff;
        background: var(--blue-strong);
      }

      .panel {
        display: grid;
        gap: 16px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .panel h2,
      .section-title h2 {
        margin: 0;
        font-size: 1.15rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .stat {
        padding: 12px;
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .stat strong {
        display: block;
        font-size: 1.35rem;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin: 28px 0 16px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .category-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .item-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 24px rgba(92, 54, 67, 0.08);
      }

      .item-card[role="button"] {
        cursor: pointer;
      }

      .photo {
        position: relative;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        background: var(--surface-soft);
      }

      .photo::before {
        content: "";
        position: absolute;
        inset: 14%;
        border-radius: 12px;
        background: var(--item-bg);
        box-shadow: inset 0 -22px 34px rgba(0, 0, 0, 0.08);
      }

      .photo::after {
        content: "";
        position: absolute;
        right: 16%;
        bottom: 15%;
        width: 28%;
        height: 10%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
      }

      .photo.has-image::before,
      .photo.has-image::after {
        display: none;
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .badge,
      .like {
        position: absolute;
        z-index: 1;
        border: 0;
      }

      .badge {
        left: 10px;
        top: 10px;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--blue-strong);
        font-size: 0.78rem;
        font-weight: 700;
        background: #fff;
      }

      .like {
        right: 10px;
        top: 10px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 999px;
        color: var(--blue-strong);
        background: rgba(255, 255, 255, 0.9);
      }

      .like.active {
        color: #fff;
        background: var(--blue-strong);
      }

      .item-body {
        display: grid;
        gap: 8px;
        padding: 14px;
      }

      .item-name {
        margin: 0;
        font-weight: 700;
      }

      .item-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .price {
        font-size: 1.18rem;
        font-weight: 800;
      }

      .location {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .detail-layout {
        display: grid;
        grid-template-columns: minmax(0, 480px) minmax(0, 1fr);
        gap: 28px;
        align-items: start;
      }

      .detail-photo {
        overflow: hidden;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, #d7eaff, #ffffff);
      }

      .detail-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .detail-photo.empty {
        background: var(--detail-bg);
      }

      .detail-info {
        display: grid;
        gap: 16px;
      }

      .detail-info h1 {
        font-size: clamp(1.8rem, 3vw, 3rem);
      }

      .detail-price {
        font-size: 1.8rem;
        font-weight: 800;
      }

      .detail-meta {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      .view {
        display: block;
      }

      .view[hidden] {
        display: none;
      }

      .seller-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
      }

      .seller-header h1 {
        font-size: clamp(1.8rem, 3vw, 3rem);
      }

      .seller-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 24px;
        align-items: start;
      }

      .listing-form,
      .preview-panel {
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .form-field {
        display: grid;
        gap: 7px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .form-field span {
        color: var(--ink);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .form-field input,
      .form-field select,
      .form-field textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        color: var(--ink);
        background: var(--surface-soft);
      }

      .form-field input[readonly] {
        color: var(--muted);
        background: #f7fbff;
      }

      .form-field textarea {
        min-height: 128px;
        resize: vertical;
      }

      .upload-box {
        display: grid;
        gap: 10px;
        place-items: center;
        min-height: 180px;
        border: 2px dashed #aacbf0;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        color: var(--muted);
        background: #f7fbff;
      }

      .upload-box strong {
        color: var(--blue-strong);
      }

      .upload-box input {
        max-width: 280px;
      }

      .photo-preview-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .photo-preview {
        position: relative;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
      }

      .photo-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .empty-preview {
        display: grid;
        min-height: 180px;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: var(--surface-soft);
        text-align: center;
      }

      .summary-card {
        display: grid;
        gap: 12px;
      }

      .summary-photo {
        aspect-ratio: 4 / 3;
        border-radius: 8px;
        background: linear-gradient(135deg, #d7eaff, #ffffff);
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .summary-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .summary-card h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .summary-card p {
        margin: 0;
        color: var(--muted);
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .bottom-nav {
        position: fixed;
        right: 16px;
        bottom: 16px;
        left: 16px;
        z-index: 12;
        display: none;
        grid-template-columns: repeat(4, 1fr);
        max-width: 520px;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .bottom-nav button {
        border: 0;
        padding: 11px 8px;
        color: var(--muted);
        background: transparent;
      }

      .bottom-nav button.active {
        color: var(--blue-strong);
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .topbar {
          grid-template-columns: 1fr auto;
        }

        .search {
          grid-column: 1 / -1;
          order: 3;
        }

        .seller-layout {
          grid-template-columns: 1fr;
        }

        .detail-layout {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .sell-button {
          padding: 10px 14px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .seller-header {
          display: grid;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .photo-preview-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid {
          gap: 12px;
        }

        .item-body {
          padding: 12px;
        }

        .bottom-nav {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand" aria-label="ミャルカリ">
          <span class="brand-mark">R</span>
          <span>ミャルカリ</span>
        </div>
        <label class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="なにを探しますか？" autocomplete="off">
        </label>
        <div class="header-actions">
          <button class="sell-button" type="button" data-open-seller>出品する</button>
          <button class="ghost-button" type="button" data-open-favorites>お気に入り</button>
          <button class="ghost-button" type="button" data-open-history>出品履歴</button>
        </div>
      </header>

      <main>
        <section class="view" id="marketView">
          <div class="section-title">
            <div>
              <h2>見つける</h2>
              <span id="resultCount">8件の商品</span>
            </div>
          </div>

          <nav class="category-tabs" aria-label="カテゴリ">
            <button class="active" type="button" data-category="all">すべて</button>
            <button type="button" data-category="fashion">ファッション</button>
            <button type="button" data-category="goods">雑貨</button>
            <button type="button" data-category="tech">ガジェット</button>
            <button type="button" data-category="books">本</button>
          </nav>

          <section class="grid" id="itemGrid" aria-label="商品一覧"></section>
        </section>

        <section class="view" id="favoritesView" hidden>
          <div class="seller-header">
            <div>
              <h1>お気に入り</h1>
              <p>ハートを押した商品をまとめて確認できます。</p>
            </div>
            <button class="ghost-button" type="button" data-open-market>一覧へ戻る</button>
          </div>

          <section class="grid" id="favoritesGrid" aria-label="お気に入り一覧"></section>
        </section>

        <section class="view" id="detailView" hidden>
          <div class="seller-header">
            <div>
              <h1>商品詳細</h1>
            </div>
            <button class="ghost-button" type="button" data-open-market>一覧へ戻る</button>
          </div>

          <section class="detail-layout" id="detailContent" aria-label="商品情報"></section>
        </section>

        <section class="view" id="historyView" hidden>
          <div class="seller-header">
            <div>
              <h1>出品履歴</h1>
              <p>出品が完了した商品の確認と編集ができます。</p>
            </div>
            <button class="ghost-button" type="button" data-open-market>一覧へ戻る</button>
          </div>

          <section class="grid" id="historyGrid" aria-label="出品履歴一覧"></section>
        </section>

        <section class="view" id="sellerView" hidden>
          <div class="seller-header">
            <div>
              <h1>出品者用画面</h1>
              <p>商品の写真、価格、在庫情報を登録して、業者向けに出品できます。</p>
            </div>
            <button class="ghost-button" type="button" data-open-market>一覧へ戻る</button>
          </div>

          <div class="seller-layout">
            <form class="listing-form" id="listingForm">
              <label class="form-field full">
                <span>商品の写真</span>
                <div class="upload-box">
                  <strong>写真を追加</strong>
                  <small>複数枚選択できます。1枚目がメイン写真になります。</small>
                  <input id="photoInput" type="file" accept="image/*" multiple>
                </div>
              </label>

              <div class="photo-preview-grid" id="photoPreviewGrid">
                <div class="empty-preview">写真を選択すると<br>ここに表示されます</div>
              </div>

              <div class="form-grid">
                <label class="form-field">
                  <span>商品名</span>
                  <input id="listingName" type="text" placeholder="例: 業務用タブレットスタンド" value="業務用タブレットスタンド" required>
                </label>
                <label class="form-field">
                  <span>販売価格</span>
                  <input id="listingPrice" type="number" min="1" placeholder="5800" value="5800" required>
                </label>
                <label class="form-field">
                  <span>カテゴリ</span>
                  <select id="listingCategory">
                    <option>ガジェット</option>
                    <option>電子機器</option>
                    <option>パソコン・周辺機器</option>
                    <option>スマートフォン・タブレット</option>
                    <option>カメラ・映像機器</option>
                    <option>生活家電</option>
                    <option>食べ物・飲料</option>
                    <option>食品原材料</option>
                    <option>キッチン用品</option>
                    <option>什器・備品</option>
                    <option>オフィス家具</option>
                    <option>工具・DIY用品</option>
                    <option>産業機械・部品</option>
                    <option>アパレル</option>
                    <option>靴・バッグ</option>
                    <option>美容・コスメ</option>
                    <option>日用品</option>
                    <option>インテリア</option>
                    <option>スポーツ・アウトドア</option>
                    <option>ホビー・おもちゃ</option>
                    <option>梱包資材</option>
                    <option>書籍・マニュアル</option>
                    <option>ペット用品</option>
                    <option>車・バイク用品</option>
                    <option>その他</option>
                  </select>
                </label>
                <label class="form-field">
                  <span>在庫数</span>
                  <input id="listingStock" type="number" min="1" placeholder="12" value="12" required>
                </label>
                <label class="form-field">
                  <span>発送元の郵便番号</span>
                  <input id="listingPostalCode" type="text" inputmode="numeric" autocomplete="postal-code" pattern="\d{3}-?\d{4}" placeholder="例: 1000001" value="1000001" required>
                </label>
                <label class="form-field">
                  <span>商品状態</span>
                  <select id="listingCondition">
                    <option>新品・未使用</option>
                    <option>未使用に近い</option>
                    <option>目立った傷や汚れなし</option>
                    <option>中古</option>
                    <option>業務利用済み</option>
                  </select>
                </label>
                <label class="form-field">
                  <span>都道府県・市区町村</span>
                  <input id="listingAddressArea" type="text" placeholder="郵便番号から自動表示" value="東京都千代田区千代田" readonly required>
                </label>
                <label class="form-field">
                  <span>番地・建物名</span>
                  <input id="listingAddressDetail" type="text" placeholder="例: 1-1 ○○ビル3F" required>
                </label>
                <label class="form-field full">
                  <span>商品説明</span>
                  <textarea id="listingDescription" placeholder="商品の特徴、ロット数、発送条件などを入力" required>店舗備品としてまとめて仕入れた商品です。複数購入や継続取引にも対応できます。</textarea>
                </label>
              </div>

              <div class="form-actions">
                <button class="ghost-button" type="reset">下書きをリセット</button>
                <button class="sell-button" type="submit">出品内容を保存</button>
                <button class="sell-button" id="publishListingButton" type="button" disabled>出品</button>
              </div>
            </form>

            <aside class="preview-panel" aria-label="出品プレビュー">
              <div class="summary-card">
                <div class="summary-photo" id="summaryPhoto"></div>
                <h2 id="summaryName">業務用タブレットスタンド</h2>
                <p><strong id="summaryPrice">¥5,800</strong> ・ <span id="summaryStock">在庫 12点</span></p>
                <p id="summaryMeta">ガジェット / 東京 / 新品・未使用</p>
                <p id="summaryDescription">店舗備品としてまとめて仕入れた商品です。複数購入や継続取引にも対応できます。</p>
              </div>
            </aside>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="メインナビゲーション">
        <button class="active" type="button">ホーム</button>
        <button type="button">検索</button>
        <button type="button" data-open-seller>出品</button>
        <button type="button">マイページ</button>
      </nav>
    </div>

    <script>
      let items = [
        { name: "サテンリボンブラウス", price: "2,400", category: "fashion", tag: "美品", area: "東京", bg: "linear-gradient(135deg, #d7eaff, #ffffff)" },
        { name: "桜色ミニバッグ", price: "3,200", category: "fashion", tag: "人気", area: "神奈川", bg: "linear-gradient(135deg, #8fc5ff, #eaf3ff)" },
        { name: "ホワイトマグセット", price: "1,500", category: "goods", tag: "送料込", area: "大阪", bg: "linear-gradient(135deg, #ffffff, #cfe4ff)" },
        { name: "ワイヤレスイヤホン", price: "5,800", category: "tech", tag: "即発送", area: "福岡", bg: "linear-gradient(135deg, #ffffff, #bcd8ff)" },
        { name: "淡色ルームライト", price: "2,900", category: "goods", tag: "未使用", area: "京都", bg: "linear-gradient(135deg, #eef6ff, #ffffff)" },
        { name: "料理レシピブック", price: "900", category: "books", tag: "良品", area: "愛知", bg: "linear-gradient(135deg, #dfeeff, #ffffff)" },
        { name: "レザー調カードケース", price: "1,200", category: "fashion", tag: "定番", area: "千葉", bg: "linear-gradient(135deg, #d7eaff, #f3f8ff)" },
        { name: "タブレットスタンド", price: "1,800", category: "tech", tag: "便利", area: "兵庫", bg: "linear-gradient(135deg, #ffffff, #d8edf8)" }
      ];

      const grid = document.querySelector("#itemGrid");
      const resultCount = document.querySelector("#resultCount");
      const searchInput = document.querySelector("#searchInput");
      const categoryButtons = document.querySelectorAll("[data-category]");
      const marketView = document.querySelector("#marketView");
      const sellerView = document.querySelector("#sellerView");
      const historyView = document.querySelector("#historyView");
      const historyGrid = document.querySelector("#historyGrid");
      const favoritesView = document.querySelector("#favoritesView");
      const favoritesGrid = document.querySelector("#favoritesGrid");
      const detailView = document.querySelector("#detailView");
      const detailContent = document.querySelector("#detailContent");
      const photoInput = document.querySelector("#photoInput");
      const photoPreviewGrid = document.querySelector("#photoPreviewGrid");
      const summaryPhoto = document.querySelector("#summaryPhoto");
      const listingForm = document.querySelector("#listingForm");
      const publishListingButton = document.querySelector("#publishListingButton");
      const listingFields = {
        name: document.querySelector("#listingName"),
        price: document.querySelector("#listingPrice"),
        category: document.querySelector("#listingCategory"),
        stock: document.querySelector("#listingStock"),
        postalCode: document.querySelector("#listingPostalCode"),
        addressArea: document.querySelector("#listingAddressArea"),
        addressDetail: document.querySelector("#listingAddressDetail"),
        condition: document.querySelector("#listingCondition"),
        description: document.querySelector("#listingDescription")
      };
      const summaryFields = {
        name: document.querySelector("#summaryName"),
        price: document.querySelector("#summaryPrice"),
        stock: document.querySelector("#summaryStock"),
        meta: document.querySelector("#summaryMeta"),
        description: document.querySelector("#summaryDescription")
      };
      let currentCategory = "all";
      let previewUrls = [];
      let postalLookupId = 0;
      let listingIdCounter = items.length + 1;
      let publishedListings = [];
      let favoriteIds = new Set();
      let editingListingId = null;
      let currentPhotoUrl = "";

      items = items.map((item, index) => ({
        id: `item-${index + 1}`,
        description: `${item.name}の商品情報です。状態や発送元を確認して購入を検討できます。`,
        stock: "1",
        condition: item.tag,
        categoryName: item.category,
        ...item
      }));

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[character]);
      }

      function formatPrice(value) {
        return Number(value || 0).toLocaleString("ja-JP");
      }

      function getCategoryKey(categoryName) {
        if (["アパレル", "靴・バッグ", "美容・コスメ"].includes(categoryName)) return "fashion";
        if (["書籍・マニュアル"].includes(categoryName)) return "books";
        if (["ガジェット", "電子機器", "パソコン・周辺機器", "スマートフォン・タブレット", "カメラ・映像機器", "生活家電"].includes(categoryName)) return "tech";
        return "goods";
      }

      function createItemCard(item, options = {}) {
        const isClickable = options.clickable ? ' role="button" tabindex="0"' : "";
        const imageMarkup = item.photoUrl ? `<img src="${escapeHtml(item.photoUrl)}" alt="${escapeHtml(item.name)}の商品写真">` : "";
        const photoClass = item.photoUrl ? "photo has-image" : "photo";
        const isFavorite = favoriteIds.has(item.id);

        return `
          <article class="item-card"${isClickable} data-item-id="${item.id || ""}" data-listing-id="${item.id || ""}">
            <div class="${photoClass}" style="--item-bg: ${item.bg}">
              ${imageMarkup}
              <span class="badge">${escapeHtml(item.tag)}</span>
              ${options.hideLike ? "" : `<button class="like${isFavorite ? " active" : ""}" type="button" aria-label="${escapeHtml(item.name)}をお気に入りに追加">${isFavorite ? "♥" : "♡"}</button>`}
            </div>
            <div class="item-body">
              <p class="item-name">${escapeHtml(item.name)}</p>
              <div class="item-meta">
                <span class="price">¥${escapeHtml(item.price)}</span>
                <span class="location">${escapeHtml(item.area)}</span>
              </div>
            </div>
          </article>
        `;
      }

      function renderItems() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = items.filter((item) => {
          const matchesCategory = currentCategory === "all" || item.category === currentCategory;
          const matchesKeyword = item.name.toLowerCase().includes(keyword) || item.area.toLowerCase().includes(keyword);
          return matchesCategory && matchesKeyword;
        });

        resultCount.textContent = `${filtered.length}件の商品`;
        grid.innerHTML = filtered.map((item) => createItemCard(item)).join("");
      }

      function renderHistory() {
        if (publishedListings.length === 0) {
          historyGrid.innerHTML = '<div class="empty-preview">出品が完了した商品はまだありません</div>';
          return;
        }

        historyGrid.innerHTML = publishedListings.map((item) => createItemCard(item, {
          clickable: true,
          hideLike: true
        })).join("");
      }

      function renderFavorites() {
        const favoriteItems = items.filter((item) => favoriteIds.has(item.id));

        if (favoriteItems.length === 0) {
          favoritesGrid.innerHTML = '<div class="empty-preview">お気に入りに追加した商品はまだありません</div>';
          return;
        }

        favoritesGrid.innerHTML = favoriteItems.map((item) => createItemCard(item, {
          clickable: true
        })).join("");
      }

      function getItemById(itemId) {
        return items.find((item) => item.id === itemId);
      }

      function renderDetail(item) {
        const imageMarkup = item.photoUrl
          ? `<img src="${escapeHtml(item.photoUrl)}" alt="${escapeHtml(item.name)}の商品写真">`
          : "";
        const isFavorite = favoriteIds.has(item.id);

        detailContent.innerHTML = `
          <div class="detail-photo${item.photoUrl ? "" : " empty"}" style="--detail-bg: ${item.bg}">
            ${imageMarkup}
          </div>
          <div class="detail-info">
            <span class="badge">${escapeHtml(item.tag)}</span>
            <h1>${escapeHtml(item.name)}</h1>
            <div class="detail-price">¥${escapeHtml(item.price)}</div>
            <div class="detail-meta">
              <span>カテゴリ: ${escapeHtml(item.categoryName || item.category)}</span>
              <span>発送元: ${escapeHtml(item.area)}</span>
              <span>在庫: ${escapeHtml(item.stock || "1")}点</span>
              <span>状態: ${escapeHtml(item.condition || item.tag)}</span>
            </div>
            <p>${escapeHtml(item.description || "商品説明はまだありません。")}</p>
            <button class="ghost-button" type="button" data-detail-favorite="${escapeHtml(item.id)}">${isFavorite ? "お気に入り解除" : "お気に入りに追加"}</button>
          </div>
        `;
      }

      function openDetailView(itemId) {
        const item = getItemById(itemId);
        if (!item) return;

        marketView.hidden = true;
        sellerView.hidden = true;
        historyView.hidden = true;
        favoritesView.hidden = true;
        detailView.hidden = false;
        renderDetail(item);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => {
          categoryButtons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          currentCategory = button.dataset.category;
          renderItems();
        });
      });

      searchInput.addEventListener("input", renderItems);

      grid.addEventListener("click", (event) => {
        const button = event.target.closest(".like");
        const card = event.target.closest("[data-item-id]");
        if (!card) return;

        if (button) {
          event.stopPropagation();
          const itemId = card.dataset.itemId;
          if (favoriteIds.has(itemId)) {
            favoriteIds.delete(itemId);
          } else {
            favoriteIds.add(itemId);
          }
          renderItems();
          renderFavorites();
          return;
        }

        openDetailView(card.dataset.itemId);
      });

      function openSellerView() {
        editingListingId = null;
        resetListingForm();
        marketView.hidden = true;
        historyView.hidden = true;
        favoritesView.hidden = true;
        detailView.hidden = true;
        sellerView.hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openMarketView() {
        sellerView.hidden = true;
        historyView.hidden = true;
        favoritesView.hidden = true;
        detailView.hidden = true;
        marketView.hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openHistoryView() {
        sellerView.hidden = true;
        marketView.hidden = true;
        favoritesView.hidden = true;
        detailView.hidden = true;
        historyView.hidden = false;
        renderHistory();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openFavoritesView() {
        sellerView.hidden = true;
        marketView.hidden = true;
        historyView.hidden = true;
        detailView.hidden = true;
        favoritesView.hidden = false;
        renderFavorites();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function formatYen(value) {
        const amount = Number(value || 0);
        return `¥${amount.toLocaleString("ja-JP")}`;
      }

      function updateListingSummary() {
        const address = [listingFields.addressArea.value, listingFields.addressDetail.value].filter(Boolean).join(" ");
        summaryFields.name.textContent = listingFields.name.value || "商品名未入力";
        summaryFields.price.textContent = formatYen(listingFields.price.value);
        summaryFields.stock.textContent = `在庫 ${listingFields.stock.value || 0}点`;
        summaryFields.meta.textContent = `${listingFields.category.value} / ${address || "発送元未入力"} / ${listingFields.condition.value}`;
        summaryFields.description.textContent = listingFields.description.value || "商品説明未入力";
      }

      function updatePublishButtonState() {
        publishListingButton.disabled = !listingForm.checkValidity() || !listingFields.addressArea.value.trim();
      }

      function handleListingChange() {
        updateListingSummary();
        updatePublishButtonState();
      }

      function normalizePostalCode(value) {
        return value.replace(/\D/g, "").slice(0, 7);
      }

      async function updateAddressFromPostalCode() {
        const lookupId = ++postalLookupId;
        const postalCode = normalizePostalCode(listingFields.postalCode.value);

        listingFields.addressArea.value = "";

        if (postalCode.length !== 7) {
          listingFields.addressArea.placeholder = "7桁の郵便番号を入力";
          updateListingSummary();
          updatePublishButtonState();
          return;
        }

        listingFields.addressArea.placeholder = "住所を検索中";
        updateListingSummary();
        updatePublishButtonState();

        try {
          const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${postalCode}`);
          const data = await response.json();
          if (lookupId !== postalLookupId) return;

          if (data.status === 200 && data.results && data.results.length > 0) {
            const result = data.results[0];
            listingFields.addressArea.value = `${result.address1}${result.address2}${result.address3}`;
            listingFields.addressArea.placeholder = "郵便番号から自動表示";
          } else {
            listingFields.addressArea.placeholder = "該当する住所が見つかりません";
          }
        } catch (error) {
          if (lookupId !== postalLookupId) return;
          listingFields.addressArea.placeholder = "住所を取得できませんでした";
        }

        updateListingSummary();
        updatePublishButtonState();
      }

      function collectListingData() {
        const address = [listingFields.addressArea.value, listingFields.addressDetail.value].filter(Boolean).join(" ");
        return {
          id: editingListingId || `listing-${listingIdCounter++}`,
          name: listingFields.name.value.trim(),
          price: formatPrice(listingFields.price.value),
          priceValue: listingFields.price.value,
          category: getCategoryKey(listingFields.category.value),
          categoryName: listingFields.category.value,
          tag: listingFields.condition.value,
          area: listingFields.addressArea.value || "発送元未入力",
          address,
          postalCode: listingFields.postalCode.value,
          addressArea: listingFields.addressArea.value,
          addressDetail: listingFields.addressDetail.value,
          stock: listingFields.stock.value,
          condition: listingFields.condition.value,
          description: listingFields.description.value,
          photoUrl: currentPhotoUrl,
          bg: "linear-gradient(135deg, #ffffff, #cfe4ff)"
        };
      }

      function publishListing() {
        if (!listingForm.checkValidity() || !listingFields.addressArea.value.trim()) {
          listingForm.reportValidity();
          if (!listingFields.addressArea.value.trim()) {
            alert("郵便番号から住所が表示されてから出品してください。");
          }
          updatePublishButtonState();
          return;
        }

        const listing = collectListingData();
        const existingIndex = publishedListings.findIndex((item) => item.id === listing.id);

        if (existingIndex >= 0) {
          publishedListings[existingIndex] = listing;
          const itemIndex = items.findIndex((item) => item.id === listing.id);
          if (itemIndex >= 0) items[itemIndex] = listing;
        } else {
          publishedListings.unshift(listing);
          items.unshift(listing);
        }

        renderItems();
        renderHistory();
        renderFavorites();
        alert(existingIndex >= 0 ? "出品情報を更新しました。" : "出品しました。");
        editingListingId = null;
        previewUrls = [];
        resetListingForm();
        openMarketView();
      }

      function resetListingForm() {
        listingFields.name.value = "";
        listingFields.price.value = "";
        listingFields.category.value = "ガジェット";
        listingFields.stock.value = "";
        listingFields.postalCode.value = "";
        listingFields.addressArea.value = "";
        listingFields.addressArea.placeholder = "郵便番号から自動表示";
        listingFields.addressDetail.value = "";
        listingFields.condition.value = "新品・未使用";
        listingFields.description.value = "";
        photoInput.value = "";
        currentPhotoUrl = "";
        renderPhotoPreviews([]);
        updateListingSummary();
        updatePublishButtonState();
      }

      function editListing(listingId) {
        const listing = publishedListings.find((item) => item.id === listingId);
        if (!listing) return;

        editingListingId = listing.id;
        listingFields.name.value = listing.name;
        listingFields.price.value = listing.priceValue || String(listing.price).replace(/\D/g, "");
        listingFields.category.value = listing.categoryName;
        listingFields.stock.value = listing.stock;
        listingFields.postalCode.value = listing.postalCode;
        listingFields.addressArea.value = listing.addressArea;
        listingFields.addressDetail.value = listing.addressDetail;
        listingFields.condition.value = listing.condition;
        listingFields.description.value = listing.description;
        currentPhotoUrl = listing.photoUrl || "";
        photoInput.value = "";

        if (currentPhotoUrl) {
          photoPreviewGrid.innerHTML = `
            <div class="photo-preview">
              <img src="${escapeHtml(currentPhotoUrl)}" alt="追加した商品写真 1">
            </div>
          `;
          summaryPhoto.innerHTML = `<img src="${escapeHtml(currentPhotoUrl)}" alt="出品商品のメイン写真">`;
        } else {
          renderPhotoPreviews([]);
        }

        updateListingSummary();
        updatePublishButtonState();
        marketView.hidden = true;
        historyView.hidden = true;
        favoritesView.hidden = true;
        detailView.hidden = true;
        sellerView.hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function clearPreviewUrls() {
        previewUrls.forEach((url) => URL.revokeObjectURL(url));
        previewUrls = [];
      }

      function renderPhotoPreviews(files) {
        clearPreviewUrls();
        const selectedFiles = Array.from(files).slice(0, 8);

        if (selectedFiles.length === 0) {
          photoPreviewGrid.innerHTML = '<div class="empty-preview">写真を選択すると<br>ここに表示されます</div>';
          summaryPhoto.innerHTML = "";
          currentPhotoUrl = "";
          return;
        }

        const previews = selectedFiles.map((file) => {
          const url = URL.createObjectURL(file);
          previewUrls.push(url);
          return { file, url };
        });

        photoPreviewGrid.innerHTML = previews.map((preview, index) => `
          <div class="photo-preview">
            <img src="${preview.url}" alt="追加した商品写真 ${index + 1}">
          </div>
        `).join("");

        summaryPhoto.innerHTML = `<img src="${previews[0].url}" alt="出品商品のメイン写真">`;
        currentPhotoUrl = previews[0].url;
      }

      document.querySelectorAll("[data-open-seller]").forEach((button) => {
        button.addEventListener("click", openSellerView);
      });

      document.querySelectorAll("[data-open-market]").forEach((button) => {
        button.addEventListener("click", openMarketView);
      });

      document.querySelector("[data-open-history]").addEventListener("click", openHistoryView);

      document.querySelector("[data-open-favorites]").addEventListener("click", openFavoritesView);

      Object.values(listingFields).forEach((field) => {
        field.addEventListener("input", handleListingChange);
        field.addEventListener("change", handleListingChange);
      });

      listingFields.postalCode.addEventListener("input", updateAddressFromPostalCode);
      listingFields.postalCode.addEventListener("change", updateAddressFromPostalCode);

      photoInput.addEventListener("change", () => {
        renderPhotoPreviews(photoInput.files);
        handleListingChange();
      });

      listingForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!listingForm.checkValidity()) {
          listingForm.reportValidity();
          updatePublishButtonState();
          return;
        }
        updatePublishButtonState();
        alert("出品内容を保存しました。");
      });

      publishListingButton.addEventListener("click", () => {
        publishListing();
      });

      historyGrid.addEventListener("click", (event) => {
        const card = event.target.closest("[data-listing-id]");
        if (!card) return;
        editListing(card.dataset.listingId);
      });

      favoritesGrid.addEventListener("click", (event) => {
        const button = event.target.closest(".like");
        const card = event.target.closest("[data-item-id]");
        if (!card) return;

        if (button) {
          event.stopPropagation();
          favoriteIds.delete(card.dataset.itemId);
          renderItems();
          renderFavorites();
          return;
        }

        openDetailView(card.dataset.itemId);
      });

      detailContent.addEventListener("click", (event) => {
        const button = event.target.closest("[data-detail-favorite]");
        if (!button) return;

        const itemId = button.dataset.detailFavorite;
        if (favoriteIds.has(itemId)) {
          favoriteIds.delete(itemId);
        } else {
          favoriteIds.add(itemId);
        }

        const item = getItemById(itemId);
        if (item) renderDetail(item);
        renderItems();
        renderFavorites();
      });

      historyGrid.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest("[data-listing-id]");
        if (!card) return;
        event.preventDefault();
        editListing(card.dataset.listingId);
      });

      listingForm.addEventListener("reset", () => {
        setTimeout(() => {
          editingListingId = null;
          resetListingForm();
        });
      });

      renderItems();
      renderHistory();
      renderFavorites();
      updateListingSummary();
      updatePublishButtonState();
    </script>
  </body>
</html>
